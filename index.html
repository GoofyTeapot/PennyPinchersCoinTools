<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noah's Coin Collector</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #b87333, #8a4b20);
    color: #fff;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* Left input panel */
  .input-panel {
    width: 60%;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    .input-panel, .list-panel {
      margin-top: 60px;
    }
  }

  .input-panel h1 {
    margin-bottom: 20px;
    font-size: 36px;
  }

  label {
    font-size: 18px;
    margin-top: 15px;
  }

  input, select {
    width: 60%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: none;
    font-size: 16px;
  }

  /* Slider */
  .slider-container {
    margin-top: 20px;
    width: 60%;
  }

  input[type="range"] {
    width: 100%;
  }

  /* Right scrollable list */
  .list-panel {
    width: 40%;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(4px);
    overflow-y: scroll;
    padding: 20px;
    .input-panel, .list-panel {
      margin-top: 60px;
    }
  }

  .list-panel h2 {
    margin-top: 0;
    font-size: 28px;
  }

  .entry {
    background: rgba(255,255,255,0.15);
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 6px;
  }

  button {
    margin-top: 25px;
    width: 200px;
    padding: 12px;
    font-size: 18px;
    border: none;
    border-radius: 6px;
    background: #ffd28a;
    color: #5a2d0c;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background: #ffca70;
  }

  .topnav {
  width: 100%;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(4px);
  padding: 12px;
  display: flex;
  gap: 25px;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 10;
}

.topnav a {
  color: #ffd28a;
  font-weight: bold;
  text-decoration: none;
  font-size: 18px;
}

.topnav a:hover {
  color: #ffffff;
}
  
</style>
</head>

<body>

<nav class="topnav">
  <a href="index.html">Home</a>
  <a href="rare.html">Rare Coins</a>
  <a href="silver.html">Silver Coins</a>
  <a href="errors.html">Error Coins</a>
  <a href="wheat.html">Wheat Pennies</a>
  <a href="tool.html">Coin Entry Tool</a>
</nav>

<!-- LEFT SIDE INPUTS -->
<div class="input-panel">
  <h1>Enter Coin Info</h1>

  <label for="year">Year</label>
  <input type="number" id="year" placeholder="e.g., 1957">

  <label for="mintmark">Mintmark</label>
  <select id="mintmark">
    <option value="">None</option>
    <option value="D">D</option>
    <option value="S">S</option>
  </select>

  <label>Positive / Negative</label>
  <div class="slider-container">
    <input type="range" min="-10" max="10" value="0" id="posneg">
  </div>

  <button id="addBtn">Add Coin</button>
</div>

<!-- RIGHT SIDE SCROLL LIST -->
<div class="list-panel">
  <h2>Coin Entries</h2>
</div>

<!-- FIREBASE + FIRESTORE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getFirestore, 
    collection, 
    addDoc, 
    serverTimestamp, 
    onSnapshot 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // Your Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyD5gEFXqoRNKNwBtrxmyiJy_OCPAylO3Q8",
    authDomain: "coin-collector-6dede.firebaseapp.com",
    projectId: "coin-collector-6dede",
    storageBucket: "coin-collector-6dede.firebasestorage.app",
    messagingSenderId: "934288131158",
    appId: "1:934288131158:web:8391d00c905a24c00067f7"
  };

  // Init Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // DOM elements
  const yearInput = document.getElementById("year");
  const mintInput = document.getElementById("mintmark");
  const slider = document.getElementById("posneg");
  const listPanel = document.querySelector(".list-panel");
  const addBtn = document.getElementById("addBtn");

  // Add coin to Firestore
  async function addCoin() {
    const year = parseInt(yearInput.value);
    const mint = mintInput.value;
    const rating = parseInt(slider.value);

    if (!year) {
      alert("Enter a year first");
      return;
    }

    await addDoc(collection(db, "coins"), {
      year,
      mintmark: mint,
      rating,
      timestamp: serverTimestamp()
    });

    yearInput.value = "";
    slider.value = 0;
  }

  addBtn.onclick = addCoin;

  // Live update listener
  onSnapshot(collection(db, "coins"), (snapshot) => {
    listPanel.innerHTML = "<h2>Coin Entries</h2>";
    snapshot.forEach((doc) => {
      const c = doc.data();
      const div = document.createElement("div");
      div.className = "entry";
      div.textContent = `${c.year}${c.mintmark ? "-" + c.mintmark : ""} — Rating ${c.rating}`;
      listPanel.appendChild(div);
    });
  });
</script>

</body>
</html>
